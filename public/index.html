<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-Commerce API RESTful</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: linear-gradient(135deg, #f5f7fb 0%, #e8eef9 100%);
      }

      .hero {
        background: #0d6efd;
        color: #fff;
        border-radius: 1rem;
      }

      .card {
        border: 0;
        box-shadow: 0 12px 30px rgba(13, 110, 253, 0.08);
      }

      .section-title {
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="container py-4 py-lg-5">
      <section class="hero p-4 p-lg-5 mb-4">
        <div class="row align-items-center g-4">
          <div class="col-lg-8">
            <h1 class="display-6 fw-bold mb-3">E-Commerce API RESTful con JWT y PostgreSQL</h1>
            <p class="mb-0">
              Interfaz academica para registro, login, consulta de productos, carrito de compras
              y subida de imagenes usando Fetch API.
            </p>
          </div>
          <div class="col-lg-4 text-lg-end">
            <span id="sessionBadge" class="badge bg-light text-primary fs-6">Sin sesion</span>
            <button id="logoutButton" class="btn btn-outline-light ms-2 hidden">Cerrar sesion</button>
          </div>
        </div>
      </section>

      <div id="alertBox" class="alert hidden" role="alert"></div>

      <div class="row g-4">
        <div class="col-lg-6">
          <div class="card h-100">
            <div class="card-body">
              <h2 class="section-title h4 mb-3">Registro</h2>
              <form id="registerForm" class="row g-3">
                <div class="col-12">
                  <label class="form-label">Username</label>
                  <input type="text" class="form-control" id="registerUsername" required />
                </div>
                <div class="col-12">
                  <label class="form-label">Email</label>
                  <input type="email" class="form-control" id="registerEmail" required />
                </div>
                <div class="col-12">
                  <label class="form-label">Password</label>
                  <input type="password" class="form-control" id="registerPassword" required />
                </div>
                <div class="col-12">
                  <button type="submit" class="btn btn-primary w-100">Crear cuenta</button>
                </div>
              </form>
            </div>
          </div>
        </div>

        <div class="col-lg-6">
          <div class="card h-100">
            <div class="card-body">
              <h2 class="section-title h4 mb-3">Login</h2>
              <form id="loginForm" class="row g-3">
                <div class="col-12">
                  <label class="form-label">Email</label>
                  <input type="email" class="form-control" id="loginEmail" required />
                </div>
                <div class="col-12">
                  <label class="form-label">Password</label>
                  <input type="password" class="form-control" id="loginPassword" required />
                </div>
                <div class="col-12">
                  <button type="submit" class="btn btn-dark w-100">Iniciar sesion</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>

      <section id="dashboard" class="hidden mt-4">
        <div class="row g-4">
          <div class="col-lg-8">
            <div class="card">
              <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
                  <h2 class="section-title h4 mb-0">Productos</h2>
                  <button id="loadProductsButton" class="btn btn-outline-primary btn-sm">
                    Recargar
                  </button>
                </div>
                <div id="productsList" class="row g-3"></div>
              </div>
            </div>
          </div>

          <div class="col-lg-4">
            <div class="card mb-4">
              <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
                  <h2 class="section-title h4 mb-0">Carrito</h2>
                  <button id="loadCartButton" class="btn btn-outline-dark btn-sm">Actualizar</button>
                </div>
                <div id="cartList" class="list-group small"></div>
              </div>
            </div>

            <div class="card">
              <div class="card-body">
                <h2 class="section-title h4 mb-3">Upload de imagen</h2>
                <form id="uploadForm" class="row g-3">
                  <div class="col-12">
                    <input
                      type="file"
                      class="form-control"
                      id="uploadFile"
                      accept=".jpg,.jpeg,.png,image/jpeg,image/png"
                      required
                    />
                  </div>
                  <div class="col-12">
                    <button type="submit" class="btn btn-success w-100">Subir archivo</button>
                  </div>
                </form>
                <div id="uploadResult" class="small text-muted mt-3"></div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>

    <script>
      const apiBase = "";
      const tokenKey = "token";

      const alertBox = document.getElementById("alertBox");
      const dashboard = document.getElementById("dashboard");
      const productsList = document.getElementById("productsList");
      const cartList = document.getElementById("cartList");
      const uploadResult = document.getElementById("uploadResult");
      const sessionBadge = document.getElementById("sessionBadge");
      const logoutButton = document.getElementById("logoutButton");

      const getToken = () => localStorage.getItem(tokenKey);

      const showAlert = (message, type = "success") => {
        alertBox.textContent = message;
        alertBox.className = `alert alert-${type}`;
      };

      const hideAlert = () => {
        alertBox.className = "alert hidden";
        alertBox.textContent = "";
      };

      const authHeaders = () => ({
        Authorization: `Bearer ${getToken()}`,
      });

      const updateSessionUI = () => {
        const token = getToken();
        const loggedIn = Boolean(token);

        dashboard.classList.toggle("hidden", !loggedIn);
        logoutButton.classList.toggle("hidden", !loggedIn);
        sessionBadge.textContent = loggedIn ? "Sesion activa" : "Sin sesion";
      };

      const request = async (url, options = {}) => {
        const response = await fetch(`${apiBase}${url}`, options);
        const data = await response.json().catch(() => ({}));

        if (!response.ok) {
          throw new Error(data.mensaje || "Solicitud no procesada");
        }

        return data;
      };

      const renderProducts = (products) => {
        productsList.innerHTML = "";

        if (!products.length) {
          productsList.innerHTML = '<p class="text-muted mb-0">No hay productos disponibles.</p>';
          return;
        }

        products.forEach((product) => {
          const column = document.createElement("div");
          column.className = "col-md-6";
          column.innerHTML = `
            <div class="card h-100">
              <div class="card-body">
                <h3 class="h5">${product.name}</h3>
                <p class="text-muted">${product.description}</p>
                <p class="fw-bold mb-3">$${Number(product.price).toFixed(2)}</p>
                <div class="input-group">
                  <input type="number" min="1" value="1" class="form-control" id="qty-${product.id}">
                  <button class="btn btn-primary" data-product-id="${product.id}">Agregar al carrito</button>
                </div>
              </div>
            </div>
          `;
          productsList.appendChild(column);
        });

        productsList.querySelectorAll("button[data-product-id]").forEach((button) => {
          button.addEventListener("click", async () => {
            const productId = button.dataset.productId;
            const quantityInput = document.getElementById(`qty-${productId}`);
            const quantity = Number(quantityInput.value || 1);

            try {
              hideAlert();
              await request("/api/cart", {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  ...authHeaders(),
                },
                body: JSON.stringify({ productId, quantity }),
              });
              showAlert("Producto agregado al carrito");
              await loadCart();
            } catch (error) {
              showAlert(error.message, "danger");
            }
          });
        });
      };

      const renderCart = (items) => {
        cartList.innerHTML = "";

        if (!items.length) {
          cartList.innerHTML =
            '<div class="list-group-item text-muted">Tu carrito esta vacio.</div>';
          return;
        }

        items.forEach((item) => {
          const element = document.createElement("div");
          element.className = "list-group-item";
          element.innerHTML = `
            <div class="d-flex justify-content-between align-items-start gap-3">
              <div>
                <strong>${item.name}</strong>
                <div>Cantidad: ${item.quantity}</div>
                <div>$${Number(item.price).toFixed(2)}</div>
              </div>
              <button class="btn btn-sm btn-outline-danger" data-remove-id="${item.product_id}">
                Eliminar
              </button>
            </div>
          `;
          cartList.appendChild(element);
        });

        cartList.querySelectorAll("button[data-remove-id]").forEach((button) => {
          button.addEventListener("click", async () => {
            try {
              hideAlert();
              await request(`/api/cart/${button.dataset.removeId}`, {
                method: "DELETE",
                headers: authHeaders(),
              });
              showAlert("Producto eliminado del carrito");
              await loadCart();
            } catch (error) {
              showAlert(error.message, "danger");
            }
          });
        });
      };

      const loadProducts = async () => {
        try {
          const data = await request("/api/products", {
            headers: authHeaders(),
          });
          renderProducts(data.data || []);
        } catch (error) {
          showAlert(error.message, "danger");
        }
      };

      const loadCart = async () => {
        try {
          const data = await request("/api/cart", {
            headers: authHeaders(),
          });
          renderCart(data.data || []);
        } catch (error) {
          showAlert(error.message, "danger");
        }
      };

      document.getElementById("registerForm").addEventListener("submit", async (event) => {
        event.preventDefault();

        try {
          hideAlert();
          await request("/api/auth/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              username: document.getElementById("registerUsername").value,
              email: document.getElementById("registerEmail").value,
              password: document.getElementById("registerPassword").value,
            }),
          });
          showAlert("Usuario registrado correctamente");
          event.target.reset();
        } catch (error) {
          showAlert(error.message, "danger");
        }
      });

      document.getElementById("loginForm").addEventListener("submit", async (event) => {
        event.preventDefault();

        try {
          hideAlert();
          const data = await request("/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              email: document.getElementById("loginEmail").value,
              password: document.getElementById("loginPassword").value,
            }),
          });

          localStorage.setItem(tokenKey, data.token);
          updateSessionUI();
          showAlert("Sesion iniciada correctamente");
          await loadProducts();
          await loadCart();
          event.target.reset();
        } catch (error) {
          showAlert(error.message, "danger");
        }
      });

      document.getElementById("uploadForm").addEventListener("submit", async (event) => {
        event.preventDefault();

        const fileInput = document.getElementById("uploadFile");
        const file = fileInput.files[0];

        if (!file) {
          showAlert("Selecciona un archivo para subir", "danger");
          return;
        }

        const formData = new FormData();
        formData.append("image", file);

        try {
          hideAlert();
          const data = await request("/api/upload", {
            method: "POST",
            headers: authHeaders(),
            body: formData,
          });
          uploadResult.textContent = `Archivo subido: ${data.filename} (${data.path})`;
          showAlert("Archivo subido correctamente");
          event.target.reset();
        } catch (error) {
          showAlert(error.message, "danger");
        }
      });

      document.getElementById("loadProductsButton").addEventListener("click", loadProducts);
      document.getElementById("loadCartButton").addEventListener("click", loadCart);

      logoutButton.addEventListener("click", () => {
        localStorage.removeItem(tokenKey);
        updateSessionUI();
        productsList.innerHTML = "";
        cartList.innerHTML = "";
        uploadResult.textContent = "";
        showAlert("Sesion cerrada", "secondary");
      });

      updateSessionUI();

      if (getToken()) {
        loadProducts();
        loadCart();
      }
    </script>
  </body>
</html>
